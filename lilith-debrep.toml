# =============================================================================
# SYSTEM DEPENDENCIES
# =============================================================================

[system_dependencies]
# Required for building Rust apps
rust = ["cargo", "rustc", "libssl-dev", "pkg-config"]

# Required for COSMIC build
cosmic = [
    "libwayland-dev",
    "libseat-dev", 
    "libxkbcommon-dev",
    "libinput-dev",
    "libdisplay-info-dev",
    "libgstreamer1.0-dev",
    "libgstreamer-plugins-base1.0-dev",
    "libegl1",
    "libgl1",
    "libgtk-3-dev"
]

# Required for Slint UI
slint = [
    "libfontconfig1-dev",
    "libxcb-render0-dev",
    "libxcb-shape0-dev",
    "libxcb-xfixes0-dev"
]

# Required for Tauri
tauri = [
    "libwebkit2gtk-4.1-dev",
    "build-essential",
    "cmake",
    "libssl-dev",
    "libayatana-appindicator3-dev",
    "librsvg2-dev"
]

# =============================================================================
# BUILD CONFIGURATION
# =============================================================================

[build]
# Number of parallel build jobs
jobs = 4

# Build directory
build_dir = "/tmp/lilith-build"

# Package output directory  
output_dir = "/home/aegon/Lilith-Build/repo/pool"

# Whether to sign packages
sign = false

# Whether to auto-approve licenses
auto_approve_licenses = false

# Timeout for builds (seconds)
build_timeout = 3600

# =============================================================================
# UPDATE CONFIGURATION
# =============================================================================

[updates]
# How often to check for updates
check_interval = "daily"

# How often to sync from upstream sources
sync_interval = "weekly"

# Auto-update packages that have auto_update = true
auto_sync = true

# Keep old versions
keep_old_versions = 3

# Update notification settings
notify_on_update = true

# =============================================================================
# BACKUP & RECOVERY
# =============================================================================

[backup]
# Backup before updates
backup_before_update = true

# Backup location
backup_dir = "/var/backup/lilith"

# Number of backups to keep
backup_count = 5
