# Lilith Linux Package Repository Specification
# Based on debrepbuild format from Pop!OS
# https://github.com/pop-os/debrepbuild
#
# This file specifies all packages and upstream sources for the Lilith Linux repository.
# It supports automatic syncing with upstream sources.

[repository]
name = "Lilith Linux"
description = "Lilith Linux Package Repository"
architectures = ["amd64"]
signing_key = "packages@lilithlinux.org"

# Distribution configuration
[distribution]
name = "stable"
codename = "stable"
version = "1.0.0"

# Components available in this distribution
components = ["main", "multiverse", "universe"]

# =============================================================================
# UPSTREAM REPOSITORY SOURCES
# =============================================================================
# These sources are synced automatically to keep packages up to date

[upstream_sources]
# Ubuntu Noble base - synced daily
[upstream_sources.ubuntu_noble]
type = "apt-mirror"
url = "http://archive.ubuntu.com/ubuntu/"
distribution = "noble"
components = ["main", "universe", "multiverse", "main-updates", "security", "backports"]
sync_interval = "daily"
priority = 100

# Pop!OS COSMIC - synced weekly
[upstream_sources.pop_cosmic]
type = "apt-mirror"
url = "http://apt.pop-os.org/ubuntu/"
distribution = "noble"
components = ["main"]
sync_interval = "weekly"
priority = 90

# Flathub - Flatpak apps (reference only, installed via flatpak)
[upstream_sources.flathub]
type = "flatpak-remote"
url = "https://flathub.org/repo/flathub.flatpakrepo"
sync_interval = "daily"
priority = 80

# Snap Store - Snap packages (reference only)
[upstream_sources.snap]
type = "snap-store"
sync_interval = "daily"

# =============================================================================
# PACKAGE SOURCES - How packages are obtained
# =============================================================================

[sources]
# Example source types:
# - local: Build from local source directory
# - apt: Install from Ubuntu repositories
# - cargo: Build and install from crates.io
# - github: Download from GitHub releases
# - flatpak: Reference to Flatpak app
# - git: Clone and build from git repository

